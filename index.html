<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">

<div class="overlay">
<h1>We Are Getting Married</h1>
<h2>Clara & Partner</h2>
<p class="date">September 29, 2026</p>
</div>

</section>


<section class="story">

<h2>Our Wedding Day</h2>

<p>
We invite you to celebrate this special moment with us.
</p>

</section>


<section class="schedule">

<div class="event">
<h3>📍 Ceremony</h3>
<p>21:00 - Church Name</p>
</div>

<div class="event">
<h3>🥂 Dinner</h3>
<p>22:00 - Wedding Hall</p>
</div>

<div class="event">
<h3>🎉 Party</h3>
<p>23:30 - Celebration Time</p>
</div>

</section>


<section class="countdown">

<h2>Countdown</h2>

<div id="timer"></div>

</section>


<section class="gallery">

<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">

<img src="https://images.unsplash.com/photo-1519741497674-611481863552">

<img src="https://images.unsplash.com/photo-1507502707541-f369a3b18502">

</section>


<section class="rsvp">

<h2>Confirm Your Attendance</h2>

<form id="rsvpForm">
    <input type="email" placeholder="Your Email" required id="email">

<input type="text" placeholder="Your Name" required id="name">

<input type="number" placeholder="Number of Guests" required id="guests">

<textarea placeholder="Message (optional)" id="message"></textarea>

<button type="submit">Confirm</button>

</form>

<p id="response"></p>

</section>

<script src="script.js"></script>

</body>
</html>
